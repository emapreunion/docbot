<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Emap Bot</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800&family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --blue:   #70caed;
  --green:  #bacf0a;
  --yellow: #f1c100;
  --bg:     #f4f7fa;
  --white:  #ffffff;
  --surface:#ffffff;
  --border: #e2e8f0;
  --text:   #1a2332;
  --muted:  #7a8fa6;
  --shadow: 0 2px 16px rgba(112,202,237,0.10);
  --radius: 16px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Nunito Sans', sans-serif;
  font-size: 15px;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  height: 66px;
  background: var(--white);
  border-bottom: 2px solid var(--border);
  box-shadow: 0 2px 12px rgba(112,202,237,0.08);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

/* Barre colorée en haut */
header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--blue) 0%, var(--green) 50%, var(--yellow) 100%);
}

.logo {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo img {
  height: 44px;
  width: auto;
  object-fit: contain;
}

.logo-divider {
  width: 1.5px;
  height: 32px;
  background: var(--border);
}

.logo-title {
  font-family: 'Nunito', sans-serif;
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.2px;
}

.logo-subtitle {
  font-size: 11px;
  color: var(--muted);
  font-weight: 400;
  margin-top: 1px;
}

.header-right { display: flex; align-items: center; gap: 10px; }

.pill {
  display: flex;
  align-items: center;
  gap: 7px;
  background: #f0f9ff;
  border: 1.5px solid #bae6fd;
  border-radius: 99px;
  padding: 6px 14px;
  font-size: 12.5px;
  color: #0369a1;
  font-weight: 600;
}

.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--muted);
  transition: background .4s, box-shadow .4s;
}
.dot.on  { background: #22c55e; box-shadow: 0 0 7px #22c55e88; }
.dot.err { background: #ef4444; }

/* ── LAYOUT ── */
.layout { display: flex; flex: 1; overflow: hidden; }

/* ── CHAT ── */
.chat { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 28px 32px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  scroll-behavior: smooth;
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }

/* ── WELCOME ── */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  min-height: 60vh;
  text-align: center;
  gap: 16px;
  animation: fadeUp .5s ease both;
}

.welcome-logo {
  width: 80px;
  height: 80px;
  border-radius: 20px;
  background: linear-gradient(135deg, #e0f4fc, #f0facc);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 20px rgba(112,202,237,0.2);
  margin-bottom: 4px;
}

.welcome-logo img { height: 54px; width: auto; object-fit: contain; }

.welcome h1 {
  font-family: 'Nunito', sans-serif;
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -0.3px;
  color: var(--text);
}

.welcome h1 span { color: var(--blue); }

.welcome p {
  color: var(--muted);
  font-size: 15px;
  max-width: 400px;
  line-height: 1.7;
}

.chips {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  margin-top: 6px;
}

.chip {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 99px;
  padding: 8px 18px;
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  transition: border-color .2s, color .2s, background .2s;
  font-weight: 600;
  box-shadow: var(--shadow);
}

.chip:hover {
  border-color: var(--blue);
  color: #0369a1;
  background: #f0f9ff;
}

/* ── MESSAGES ── */
.msg {
  display: flex;
  gap: 12px;
  max-width: 800px;
  animation: fadeUp .22s ease both;
}

.msg.user {
  align-self: flex-end;
  flex-direction: row-reverse;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.av {
  width: 34px; height: 34px;
  border-radius: 10px;
  display: grid;
  place-items: center;
  flex-shrink: 0;
  margin-top: 2px;
  overflow: hidden;
}

.av.bot {
  background: linear-gradient(135deg, #e0f4fc, #f0facc);
  border: 1.5px solid #bae6fd;
}

.av.bot img { height: 22px; width: auto; object-fit: contain; }

.av.user {
  background: linear-gradient(135deg, var(--blue), #38bdf8);
  font-size: 15px;
  color: white;
  font-weight: 700;
}

.bubble {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  border-top-left-radius: 4px;
  padding: 13px 17px;
  line-height: 1.75;
  font-size: 14.5px;
  max-width: 640px;
  box-shadow: 0 1px 8px rgba(0,0,0,0.05);
}

.msg.user .bubble {
  background: linear-gradient(135deg, var(--blue), #38bdf8);
  border-color: transparent;
  color: white;
  border-top-left-radius: 16px;
  border-top-right-radius: 4px;
  box-shadow: 0 2px 12px rgba(112,202,237,0.3);
}

.bubble strong { color: #0369a1; font-weight: 700; }
.msg.user .bubble strong { color: white; }
.bubble em { font-style: italic; color: var(--muted); }
.msg.user .bubble em { color: rgba(255,255,255,0.8); }

.bubble code {
  font-family: monospace;
  font-size: 12.5px;
  background: #f1f5f9;
  padding: 1px 6px;
  border-radius: 5px;
  color: #0369a1;
}

.bubble pre {
  background: #f8fafc;
  border: 1.5px solid var(--border);
  border-radius: 9px;
  padding: 12px 14px;
  overflow-x: auto;
  margin: 8px 0;
}

.bubble pre code { background: none; padding: 0; color: var(--text); }
.bubble ul, .bubble ol { padding-left: 18px; margin: 6px 0; }
.bubble li { margin-bottom: 3px; }

/* Typing dots */
.typing-dots { display: flex; gap: 5px; align-items: center; padding: 4px 2px; }
.typing-dots span {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--blue);
  animation: bounce 1.1s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: .18s; background: var(--green); }
.typing-dots span:nth-child(3) { animation-delay: .36s; background: var(--yellow); }

@keyframes bounce {
  0%,60%,100% { transform: translateY(0); opacity:.4; }
  30% { transform: translateY(-7px); opacity:1; }
}

/* ── INPUT BAR ── */
.input-bar {
  flex-shrink: 0;
  padding: 16px 32px 20px;
  background: var(--white);
  border-top: 1.5px solid var(--border);
  box-shadow: 0 -2px 12px rgba(0,0,0,0.04);
}

.input-wrap {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 11px 14px;
  transition: border-color .2s, box-shadow .2s;
}

.input-wrap:focus-within {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(112,202,237,0.15);
}

#inp {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'Nunito Sans', sans-serif;
  font-size: 15px;
  resize: none;
  max-height: 130px;
  line-height: 1.6;
}
#inp::placeholder { color: var(--muted); }

.send {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--blue), #38bdf8);
  border: none;
  cursor: pointer;
  display: grid;
  place-items: center;
  flex-shrink: 0;
  align-self: flex-end;
  transition: opacity .2s, transform .1s, box-shadow .2s;
  box-shadow: 0 2px 8px rgba(112,202,237,0.4);
}
.send:hover { opacity: .85; box-shadow: 0 4px 14px rgba(112,202,237,0.5); }
.send:active { transform: scale(.93); }
.send:disabled { opacity: .3; cursor: not-allowed; box-shadow: none; }
.send svg { width: 16px; height: 16px; fill: white; }

.hint {
  text-align: center;
  font-size: 11.5px;
  color: var(--muted);
  margin-top: 8px;
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 24px; right: 24px;
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 18px;
  font-size: 13.5px;
  z-index: 999;
  max-width: 320px;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  animation: fadeUp .3s ease both;
  font-weight: 600;
}
.toast.err  { border-left: 3px solid #ef4444; color: #ef4444; }
.toast.ok   { border-left: 3px solid #22c55e; color: #166534; }
.toast.info { border-left: 3px solid var(--blue); color: #0369a1; }

@media (max-width: 600px) {
  .messages { padding: 16px; }
  .input-bar { padding: 12px 16px 16px; }
  header { padding: 0 16px; }
  .logo-title { font-size: 15px; }
}
</style>
</head>

        <h1>Bienvenue sur <span>Emap Bot</span></h1>
        <p>Je suis votre assistant documentaire spécialisé pour les sélections des différents DE de l'Emap. Comment puis-je vous renseigner ?</p>
        <div class="chips" id="suggestion-chips"></div>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-wrap">
        <textarea id="inp" rows="1"
          placeholder="Posez votre question…"
          onkeydown="onKey(event)"
          oninput="resize(this)"></textarea>
        <button class="send" id="send-btn" onclick="send()" disabled>
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
        </button>
      </div>
      <div class="hint">Entrée pour envoyer &nbsp;·&nbsp; Maj+Entrée pour aller à la ligne</div>
    </div>
  </div>
</div>

<script>
let history = [];
let busy = false;
let sourcesReady = false;

const SUGGESTIONS = [
  "Quelles sont les conditions d'accès à la formation d'AES ?",
  "Quel est le contenu de la formation de ME ?",
  "Combien de temps dure la formation de TISF ?",
  "Comment se déroule la certification du DE psychomotricien ?"
];

async function checkStatus() {
  try {
    const r = await fetch('/status');
    const d = await r.json();
    if (d.ok) {
      setDot('on', `${d.sources} source${d.sources > 1 ? 's' : ''} chargée${d.sources > 1 ? 's' : ''}`);
      sourcesReady = true;
      enableSend();
      buildChips();
    } else {
      setDot('err', 'Aucune source');
    }
  } catch {
    setDot('err', 'Serveur hors ligne');
  }
}

function setDot(state, label) {
  document.getElementById('dot').className = 'dot ' + state;
  document.getElementById('status-label').textContent = label;
}

function buildChips() {
  const container = document.getElementById('suggestion-chips');
  SUGGESTIONS.forEach(s => {
    const c = document.createElement('div');
    c.className = 'chip';
    c.textContent = s;
    c.onclick = () => {
      document.getElementById('inp').value = s;
      resize(document.getElementById('inp'));
      enableSend();
      send();
    };
    container.appendChild(c);
  });
}

checkStatus();

function enableSend() {
  const inp = document.getElementById('inp');
  const btn = document.getElementById('send-btn');
  btn.disabled = busy || !sourcesReady || !inp.value.trim();
}

document.getElementById('inp').addEventListener('input', enableSend);

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!document.getElementById('send-btn').disabled) send();
  }
}

function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 130) + 'px';
}

async function send() {
  const inp = document.getElementById('inp');
  const question = inp.value.trim();
  if (!question || busy) return;

  const w = document.getElementById('welcome');
  if (w) w.remove();

  busy = true;
  inp.value = '';
  inp.style.height = 'auto';
  enableSend();

  addMessage('user', question);
  const typing = addTyping();

  history.push({ role: 'user', content: question });

  try {
    const resp = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: question, history: history.slice(-10) })
    });

    const data = await resp.json();
    if (!resp.ok || data.error) throw new Error(data.error || 'Erreur serveur');

    typing.remove();
    addMessage('bot', data.answer);
    history.push({ role: 'assistant', content: data.answer });

  } catch(e) {
    typing.remove();
    addMessage('bot', `❌ ${e.message}`);
    history.pop();
    toast(e.message, 'err');
  }

  busy = false;
  enableSend();
}

function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function mdToHtml(t) {
  t = esc(t);
  t = t.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
  t = t.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
  t = t.replace(/^#{1,3} (.+)$/gm, '<strong>$1</strong>');
  t = t.replace(/^- (.+)$/gm, '• $1');
  t = t.replace(/\n{2,}/g, '<br><br>');
  t = t.replace(/\n/g, '<br>');
  return t;
}

function toast(msg, type = 'info') {
  const icons = { ok: '✓', err: '✗', info: 'ℹ' };
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${icons[type] || 'ℹ'}</span><span>${msg}</span>`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}
