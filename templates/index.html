<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{{ bot_name }}</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0c0d10;
  --surface: #13151a;
  --surface2: #1a1d24;
  --border: #252830;
  --accent: #f0c040;
  --accent2: #5b8dee;
  --text: #e6e8ed;
  --muted: #5c6272;
  --danger: #ef4444;
  --success: #22c55e;
  --radius: 14px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Subtle background grid */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ── HEADER ── */
header {
  position: relative;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  height: 58px;
  border-bottom: 1px solid var(--border);
  background: rgba(12,13,16,0.95);
  backdrop-filter: blur(16px);
  flex-shrink: 0;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-mark {
  width: 32px; height: 32px;
  background: var(--accent);
  border-radius: 8px;
  display: grid;
  place-items: center;
  font-size: 17px;
  flex-shrink: 0;
}

.logo-name {
  font-family: 'DM Serif Display', serif;
  font-size: 19px;
  letter-spacing: -0.2px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 14px;
}

.pill {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 5px 12px;
  font-size: 12.5px;
  color: var(--muted);
}

.dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--muted);
  transition: background 0.4s, box-shadow 0.4s;
}
.dot.on  { background: var(--success); box-shadow: 0 0 7px var(--success); }
.dot.err { background: var(--danger); }

/* ── LAYOUT ── */
.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
  position: relative;
  z-index: 1;
}

/* ── CHAT ── */
.chat {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 32px 28px;
  display: flex;
  flex-direction: column;
  gap: 22px;
  scroll-behavior: smooth;
}

/* scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

/* ── WELCOME ── */
.welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  min-height: 60vh;
  text-align: center;
  gap: 14px;
  animation: fadeUp .5s ease both;
}

.welcome-emoji { font-size: 54px; }

.welcome h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 28px;
  font-weight: 400;
  letter-spacing: -0.3px;
}

.welcome p {
  color: var(--muted);
  font-size: 15px;
  max-width: 380px;
  line-height: 1.7;
}

.chips {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  margin-top: 6px;
}

.chip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 7px 16px;
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  transition: border-color .2s, color .2s;
}

.chip:hover { border-color: var(--accent); color: var(--accent); }

/* ── MESSAGES ── */
.msg {
  display: flex;
  gap: 11px;
  max-width: 760px;
  animation: fadeUp .22s ease both;
}

.msg.user {
  align-self: flex-end;
  flex-direction: row-reverse;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.av {
  width: 30px; height: 30px;
  border-radius: 8px;
  display: grid;
  place-items: center;
  font-size: 15px;
  flex-shrink: 0;
  margin-top: 3px;
}

.av.bot  { background: var(--accent); }
.av.user { background: var(--accent2); }

.bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 13px 17px;
  line-height: 1.75;
  font-size: 14.5px;
  max-width: 640px;
}

.msg.user .bubble {
  background: var(--surface2);
  border-color: rgba(91,141,238,.35);
}

/* Markdown-like in bubble */
.bubble b, .bubble strong { color: var(--accent); font-weight: 600; }
.bubble em { font-style: italic; color: var(--muted); }
.bubble code {
  font-family: 'DM Mono', monospace;
  font-size: 12.5px;
  background: var(--surface2);
  padding: 1px 6px;
  border-radius: 5px;
  color: var(--accent2);
}
.bubble pre {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 9px;
  padding: 12px 14px;
  overflow-x: auto;
  margin: 8px 0;
}
.bubble pre code { background: none; padding: 0; color: var(--text); }
.bubble ul, .bubble ol { padding-left: 18px; margin: 6px 0; }
.bubble li { margin-bottom: 3px; }
.bubble hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

/* Typing dots */
.typing-dots {
  display: flex; gap: 5px; align-items: center; padding: 4px 2px;
}
.typing-dots span {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--muted);
  animation: bounce 1.1s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: .18s; }
.typing-dots span:nth-child(3) { animation-delay: .36s; }

@keyframes bounce {
  0%,60%,100% { transform: translateY(0); opacity:.35; }
  30% { transform: translateY(-7px); opacity:1; }
}

/* ── INPUT BAR ── */
.input-bar {
  flex-shrink: 0;
  padding: 16px 28px 20px;
  background: rgba(12,13,16,.9);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
}

.input-wrap {
  display: flex;
  align-items: flex-end;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 11px 14px;
  transition: border-color .2s;
}
.input-wrap:focus-within { border-color: var(--accent2); }

#inp {
  flex: 1;
  background: none;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  resize: none;
  max-height: 130px;
  line-height: 1.6;
}
#inp::placeholder { color: var(--muted); }

.send {
  width: 36px; height: 36px;
  border-radius: 9px;
  background: var(--accent);
  border: none;
  cursor: pointer;
  display: grid;
  place-items: center;
  flex-shrink: 0;
  align-self: flex-end;
  transition: opacity .2s, transform .1s;
}
.send:hover { opacity: .8; }
.send:active { transform: scale(.93); }
.send:disabled { opacity: .25; cursor: not-allowed; }
.send svg { width: 15px; height: 15px; fill: #0c0d10; }

.hint {
  text-align: center;
  font-size: 11.5px;
  color: var(--muted);
  margin-top: 8px;
}

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 24px; right: 24px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 18px;
  font-size: 13.5px;
  z-index: 999;
  max-width: 320px;
  display: flex;
  align-items: center;
  gap: 10px;
  box-shadow: 0 10px 40px rgba(0,0,0,.5);
  animation: fadeUp .3s ease both;
}
.toast.err  { border-left: 3px solid var(--danger); }
.toast.ok   { border-left: 3px solid var(--success); }
.toast.info { border-left: 3px solid var(--accent2); }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .messages { padding: 18px 14px; }
  .input-bar { padding: 12px 14px 16px; }
  header { padding: 0 14px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">📚</div>
    <span class="logo-name">{{ bot_name }}</span>
  </div>
  <div class="header-right">
    <div class="pill">
      <div class="dot" id="dot"></div>
      <span id="status-label">Connexion…</span>
    </div>
  </div>
</header>

<div class="layout">
  <div class="chat">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-emoji">🤖</div>
        <h1>{{ bot_name }}</h1>
        <p>Je suis votre assistant documentaire. Posez-moi vos questions, je réponds en me basant uniquement sur les sources chargées.</p>
        <div class="chips" id="suggestion-chips"></div>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-wrap">
        <textarea id="inp" rows="1"
          placeholder="Posez votre question…"
          onkeydown="onKey(event)"
          oninput="resize(this)"></textarea>
        <button class="send" id="send-btn" onclick="send()" disabled>
          <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
        </button>
      </div>
      <div class="hint">Entrée pour envoyer &nbsp;·&nbsp; Maj+Entrée pour aller à la ligne</div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
let history = [];
let busy = false;
let sourcesReady = false;

const SUGGESTIONS = [
  "Résume les points clés des documents",
  "Quelles sont les informations principales ?",
  "Que dit le document sur…",
  "Donne-moi un aperçu général"
];

// ═══════════════════════════════════════
//  INIT — vérifie le statut serveur
// ═══════════════════════════════════════
async function checkStatus() {
  try {
    const r = await fetch('/status');
    const d = await r.json();
    if (d.ok) {
      setDot('on', `${d.sources} source${d.sources > 1 ? 's' : ''} chargée${d.sources > 1 ? 's' : ''}`);
      sourcesReady = true;
      enableSend();
      buildChips();
    } else {
      setDot('err', 'Aucune source');
    }
  } catch {
    setDot('err', 'Serveur hors ligne');
  }
}

function setDot(state, label) {
  document.getElementById('dot').className = 'dot ' + state;
  document.getElementById('status-label').textContent = label;
}

function buildChips() {
  const container = document.getElementById('suggestion-chips');
  SUGGESTIONS.forEach(s => {
    const c = document.createElement('div');
    c.className = 'chip';
    c.textContent = s;
    c.onclick = () => { document.getElementById('inp').value = s; resize(document.getElementById('inp')); enableSend(); send(); };
    container.appendChild(c);
  });
}

checkStatus();

// ═══════════════════════════════════════
//  SEND
// ═══════════════════════════════════════
function enableSend() {
  const inp = document.getElementById('inp');
  const btn = document.getElementById('send-btn');
  btn.disabled = busy || !sourcesReady || !inp.value.trim();
}

document.getElementById('inp').addEventListener('input', enableSend);

function onKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!document.getElementById('send-btn').disabled) send();
  }
}

function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 130) + 'px';
}

async function send() {
  const inp = document.getElementById('inp');
  const question = inp.value.trim();
  if (!question || busy) return;

  // Remove welcome
  const w = document.getElementById('welcome');
  if (w) w.remove();

  busy = true;
  inp.value = '';
  inp.style.height = 'auto';
  enableSend();

  addMessage('user', question);
  const typing = addTyping();

  history.push({ role: 'user', content: question });

  try {
    const resp = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: question, history: history.slice(-10) })
    });

    const data = await resp.json();

    if (!resp.ok || data.error) {
      throw new Error(data.error || 'Erreur serveur');
    }

    typing.remove();
    addMessage('bot', data.answer);
    history.push({ role: 'assistant', content: data.answer });

  } catch(e) {
    typing.remove();
    addMessage('bot', `❌ ${e.message}`);
    history.pop();
    toast(e.message, 'err');
  }

  busy = false;
  enableSend();
}

// ═══════════════════════════════════════
//  MESSAGES
// ═══════════════════════════════════════
function addMessage(role, text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = `
    <div class="av ${role}">${role === 'bot' ? '🤖' : '👤'}</div>
    <div class="bubble">${role === 'bot' ? mdToHtml(text) : esc(text)}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function addTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `<div class="av bot">🤖</div>
    <div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

// ═══════════════════════════════════════
//  MARKDOWN SIMPLE
// ═══════════════════════════════════════
function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function mdToHtml(t) {
  t = esc(t);
  t = t.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
  t = t.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  t = t.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g, '<em>$1</em>');
  t = t.replace(/^#{1,3} (.+)$/gm, '<strong>$1</strong>');
  t = t.replace(/^- (.+)$/gm, '• $1');
  t = t.replace(/^\d+\. (.+)$/gm, (_, c) => `${_}`);
  t = t.replace(/\n{2,}/g, '<br><br>');
  t = t.replace(/\n/g, '<br>');
  return t;
}

// ═══════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════
function toast(msg, type = 'info') {
  const icons = { ok: '✓', err: '✗', info: 'ℹ' };
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${icons[type] || 'ℹ'}</span><span>${msg}</span>`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}
</script>
</body>
</html>
